<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>妈妈的文章收藏</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(135deg, #fce4ec 0%, #f3e5f5 50%, #e8eaf6 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 680px;
      margin: 0 auto;
    }
    header {
      text-align: center;
      padding: 40px 20px 30px;
    }
    header h1 {
      font-size: 28px;
      color: #5d4037;
      margin-bottom: 8px;
    }
    header p {
      color: #8d6e63;
      font-size: 15px;
    }
    .article-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 0 4px;
    }
    .article-card {
      background: white;
      border-radius: 16px;
      padding: 20px 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      text-decoration: none;
      color: inherit;
      transition: transform 0.2s, box-shadow 0.2s;
      display: block;
    }
    .article-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    .article-card:active {
      transform: scale(0.98);
    }
    .article-title {
      font-size: 17px;
      font-weight: 600;
      color: #37474f;
      margin-bottom: 6px;
      line-height: 1.4;
    }
    .article-meta {
      font-size: 13px;
      color: #9e9e9e;
    }
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #bdbdbd;
    }
    .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
    .empty-state p { font-size: 15px; }
    .count-badge {
      display: inline-block;
      background: #e8f5e9;
      color: #43a047;
      font-size: 13px;
      padding: 4px 12px;
      border-radius: 20px;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>妈妈的文章收藏</h1>
      <p>所有保存的美篇文章都在这里</p>
      <div class="count-badge" id="count"></div>
    </header>
    <div class="article-list" id="list"></div>
  </div>

  <script>
    fetch('/api/articles')
      .then(r => r.json())
      .then(articles => {
        const list = document.getElementById('list');
        const count = document.getElementById('count');

        if (articles.length === 0) {
          list.innerHTML = '<div class="empty-state"><div class="icon">📝</div><p>还没有保存文章哦</p></div>';
          count.style.display = 'none';
          return;
        }

        count.textContent = '共 ' + articles.length + ' 篇文章';

        list.innerHTML = articles.map(a =>
          '<a class="article-card" href="/articles/' + encodeURIComponent(a.file) + '">' +
            '<div class="article-title">' + a.name + '</div>' +
            '<div class="article-meta">' + a.date + ' · ' + a.size + '</div>' +
          '</a>'
        ).join('');
      });
  </script>
</body>
</html>
